version:  "3.9"

services:
  db:
    image:  postgres:16
    container_name: test_postgres
    environment:
      POSTGRES_USER:  postgres
      POSTGRES_PASSWORD:  postgres
      POSTGRES_DB:  test_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_db"]
      interval: 5s
      timeout:  5s
      retries:  20

volumes:
  pgdata: