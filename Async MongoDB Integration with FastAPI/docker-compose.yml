version: '3.8'
services:
  mongodb:
    image:  mongo:7.0
    container_name: mongodb_container
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: test_mongodb
    volumes:
      - mongodb_data:/data/db
    restart:  unless-stopped

volumes:
  mongodb_data:
    driver: local